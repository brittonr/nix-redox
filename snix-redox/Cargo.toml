# snix-redox workspace
#
# This workspace includes snix-redox (our crate) and the upstream snix crates
# extracted by nix/pkgs/infrastructure/snix-upstream-source.nix. The upstream
# crates use workspace.dependencies for version resolution, so they must be
# workspace members.
#
# For local development, `upstream/` is a symlink to the Nix derivation output.
# For Nix builds, it's populated by the build system.

[workspace]
resolver = "2"
members = [
  ".",
  "upstream/nix-compat",
  "upstream/nix-compat-derive",
  "upstream/eval",
  "upstream/eval/builtin-macros",
  "upstream/glue",
  "upstream/store",
  "upstream/castore",
  "upstream/build",
  "upstream/serde",
  "upstream/tracing",
  "upstream/cli/base",
]

[workspace.package]
version = "0.1.0"
rust-version = "1.91.1"

# Upstream snix workspace dependency versions.
# Copied from https://git.snix.dev/snix/snix @ eee477929d6b500936556e2f8a4e187d37525365
[workspace.dependencies]
anyhow = "1.0.86"
async-compression = "0.4.12"
async-process = "2.2.4"
async-stream = "0.3.5"
axum = "0.7.5"
axum-extra = "0.9.3"
axum-range = "0.4.0"
bigtable_rs = "0.2.18"
bitflags = "2.6.0"
blake3 = "1.5.4"
bstr = "1.10.0"
bytes = "1.7.1"
clap = "4.5.16"
codemap = "0.1.3"
codemap-diagnostic = "0.1.2"
count-write = "0.1.0"
criterion = "0.5"
data-encoding = "2.6.0"
digest = "0.10.7"
dirs = "4.0.0"
ed25519 = "2.2.3"
ed25519-dalek = "2.1.1"
erased-serde = "0.4.5"
expect-test = "1.5.0"
fastcdc = "3.1.0"
fuse-backend-rs = "=0.12.0"
futures = "0.3.30"
genawaiter = { version = "0.99.1", default-features = false }
hashbrown = "0.15.4"
hex-literal = "0.4.1"
http = "1.1.0"
hyper-util = "0.1.7"
itertools = "0.12.1"
lexical-core = "0.8.5"
libc = "0.2.158"
lru = "0.12.4"
md-5 = "0.10.6"
mimalloc = "0.1.43"
nix = "0.27.1"
nom = "8.0"
