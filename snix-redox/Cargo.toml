# ─── snix-redox package ────────────────────────────────────────────────────

[package]
name = "snix-redox"
version = "0.4.0"
edition = "2021"
description = "Nix evaluator, store manager, and binary cache client for Redox OS"

[[bin]]
name = "snix"
path = "src/main.rs"
test = false

[[bin]]
name = "proxy_namespace_test"
path = "tests/redox/proxy_namespace_test.rs"
test = false

[lib]
name = "snix_redox"
path = "src/lib.rs"
test = false

[dependencies]
# === Upstream snix crates ===
nix-compat = { path = "upstream/nix-compat", default-features = false, features = ["serde"] }
snix-eval = { path = "upstream/eval", default-features = false, features = ["impure"] }
snix-glue = { path = "upstream/glue", default-features = false }
snix-store = { path = "upstream/store", default-features = false, features = [] }
snix-castore = { path = "upstream/castore", default-features = false, features = [] }
snix-build = { path = "upstream/build", default-features = false, features = [] }

# === Async runtime (upstream snix requires tokio) ===
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "fs"] }

# === Sync HTTP client for binary cache (Redox-side, not eval) ===
ureq = { version = "3.0", default-features = false, features = ["rustls"] }

# === Compression for NAR files (pure Rust) ===
ruzstd = "0.8"
lzma-rs = "0.3"
bzip2-rs = "0.1"
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }

# === Standard utilities ===
clap = { version = "4", features = ["derive", "env"] }
serde = { version = ">=1.0.100, <1.0.218", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
blake3 = { version = "1.8", default-features = false, features = ["pure"] }
data-encoding = "2"
thiserror = "2"
bytes = "1"
bstr = "1"
genawaiter = { version = "0.99.1", default-features = false }

# Redox-only: scheme daemon support (stored, profiled) and sandboxing.
[target.'cfg(target_os = "redox")'.dependencies]
redox-scheme = "0.11"
redox_syscall = { version = "0.7", features = ["std"] }
libredox = { version = "0.1", features = ["mkns"] }
ioslice = "0.6"

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = "s"
lto = true
panic = "abort"
